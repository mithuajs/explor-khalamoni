<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

  <title> Explore  Khalamoni</title>
  <style type="text/tailwindcss">
    @theme {
        --color-clifford: #da373d;
      }
    </style>
</head>

<body>

  <header>
    <div class="navbar bg-base-300 shadow-sm">
      <div class="flex-1">
        <a class="btn btn-ghost text-xl">daisyUI</a>
      </div>
      <div class="flex gap-2">
        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
            <div class="w-10 rounded-full">
              <img alt="Tailwind CSS Navbar component"
                src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" />
            </div>
          </div>
          <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
            <li>
              <a class="justify-between">
                Profile
                <span class="badge">New</span>
              </a>
            </li>
            <li><a>Settings</a></li>
            <li><a>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>

  </header>

  <section>
    <div class="hero bg-base-200 min-h-screen">
      <div class="hero-content flex-col lg:flex-row-reverse">
        <div class="text-center lg:text-left">
          <h1 class="text-5xl font-bold">Login now!</h1>
          <p class="py-6">
            Provident cupiditate voluptatem et in. Quaerat fugiat ut assumenda excepturi exercitationem
            quasi. In deleniti eaque aut repudiandae et a id nisi.
          </p>
        </div>
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
          <div class="card-body">
            <fieldset class="fieldset">
              <label class="label">Email</label>
              <input type="email" class="input" placeholder="Email" />
              <label class="label">Password</label>
              <input type="password" class="input" placeholder="Password" />
              <div><a class="link link-hover">Forgot password?</a></div>
              <button class="btn btn-neutral mt-4">Login</button>
            </fieldset>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="hover-3d items-center justify-center  flex ">
      <!-- content -->
      <figure class="max-w-100 rounded-2xl">
        <img src="https://img.daisyui.com/images/stock/creditcard.webp" alt="3D card" />
      </figure>
      <!-- 8 empty divs needed for the 3D effect -->
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </section>

  <div class="dropdown mb-72">
    <div tabindex="0" role="button" class="btn m-1">
      Theme
      <svg width="12px" height="12px" class="inline-block h-2 w-2 fill-current opacity-60"
        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048">
        <path d="M1799 349l242 241-1017 1017L7 590l242-241 775 775 775-775z"></path>
      </svg>
    </div>
    <ul tabindex="-1" class="dropdown-content bg-base-300 rounded-box z-1 w-52 p-2 shadow-2xl">
      <li>
        <input type="radio" name="theme-dropdown"
          class="theme-controller w-full btn btn-sm btn-block btn-ghost justify-start" aria-label="Default"
          value="default" />
      </li>
      <li>
        <input type="radio" name="theme-dropdown"
          class="theme-controller w-full btn btn-sm btn-block btn-ghost justify-start" aria-label="Retro"
          value="retro" />
      </li>
      <li>
        <input type="radio" name="theme-dropdown"
          class="theme-controller w-full btn btn-sm btn-block btn-ghost justify-start" aria-label="Cyberpunk"
          value="cyberpunk" />
      </li>
      <li>
        <input type="radio" name="theme-dropdown"
          class="theme-controller w-full btn btn-sm btn-block btn-ghost justify-start" aria-label="Valentine"
          value="valentine" />
      </li>
      <li>
        <input type="radio" name="theme-dropdown"
          class="theme-controller w-full btn btn-sm btn-block btn-ghost justify-start" aria-label="Aqua" value="aqua" />
      </li>
    </ul>
  </div>
  <h1 class="text-3xl text-center py-10 font-bold underline text-clifford">
    Hello world!
  </h1>
  <div class="text-center">


    <button class=" btn  bg-primary/10 btn-outline w-70 rounded-full"> click me </button>
  </div>

  <script>
    const button = document.querySelector('button');
    button.addEventListener('click', function () {
      console.log('Button was clicked!');
    });
  </script>
</body>

</html>
